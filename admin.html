<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>問診受付パネル | みなとクリニック</title>
<style>
:root{
  --teal:#2286A5;--teal-dark:#0B4A61;--teal-soft:#D9EEF5;
  --bg:#EFF7FB;--ink:#1A3A46;--mint:#2BB59A;--card:#fff;--line:#C5E0EB;--radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.6}
.wrap{max-width:900px;margin:0 auto;padding:24px 20px 80px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:10px}
header img{height:34px}
.head-title{font-size:14px;font-weight:800;color:var(--teal);letter-spacing:.12em}
.wave{display:block;width:100%;height:20px;margin:2px 0 18px}
.badge{display:inline-block;background:var(--teal);color:#fff;font-size:12px;font-weight:700;border-radius:999px;padding:3px 12px}

/* login */
#login{max-width:360px;margin:60px auto;background:var(--card);border-radius:var(--radius);padding:30px;box-shadow:0 2px 12px rgba(34,134,165,.1);text-align:center}
#login h2{font-size:17px;color:var(--teal-dark);margin-bottom:16px}
input[type=password]{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px;font-size:16px;text-align:center;letter-spacing:.3em}
input:focus{outline:none;border-color:var(--teal)}
button{font-family:inherit;cursor:pointer}
.btn{border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:700;transition:.12s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--teal);color:#fff;width:100%;margin-top:14px}
.err{color:#B03A3A;font-size:13px;margin-top:10px;display:none}

/* list */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.count{font-size:14px;color:#4A6B78;font-weight:600}
.btn-refresh{background:#fff;border:1.5px solid var(--line);color:var(--teal);border-radius:10px;padding:8px 16px;font-size:13.5px;font-weight:700}
.cards{display:grid;gap:14px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 8px rgba(34,134,165,.08);overflow:hidden}
.card-head{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;user-select:none}
.card-head:hover{background:#F6FBFD}
.code{font-size:26px;font-weight:900;font-style:italic;color:var(--teal-dark);letter-spacing:.05em;min-width:86px}
.meta{flex:1;font-size:13px;color:#4A6B78}
.meta b{color:var(--ink);font-size:14px}
.lang-tag{background:var(--teal-soft);color:var(--teal-dark);font-size:11.5px;font-weight:700;border-radius:6px;padding:2px 8px}
.chev{color:var(--teal);font-size:18px;transition:.2s}
.card.open .chev{transform:rotate(90deg)}
.card-body{display:none;border-top:1.5px solid var(--line);padding:16px 18px 20px;background:#FBFEFF}
.card.open .card-body{display:block}

.copy-block{margin-bottom:16px}
.copy-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.copy-label span{font-size:12.5px;font-weight:800;color:var(--teal);letter-spacing:.08em}
.btn-copy{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700}
.btn-copy.done{background:var(--mint)}
pre{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:14.5px;white-space:pre-wrap;word-break:break-all}
.dob-line{font-size:15px;margin-bottom:16px;background:var(--teal-soft);border-radius:10px;padding:10px 14px}
.dob-line b{font-size:18px;font-style:italic}
.foreign-note{font-size:12px;color:#7A93A0;margin-top:5px}
.btn-del{background:#fff;border:1.5px solid #E0A5A5;color:#B03A3A;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:700;width:100%}
.btn-del.confirm{background:#B03A3A;color:#fff;border-color:#B03A3A}
.card.is-new{animation:glow 2.6s ease}
.card.is-new .code::after{content:"NEW";font-size:10px;font-style:normal;font-weight:800;background:var(--mint);color:#fff;border-radius:5px;padding:2px 6px;margin-left:8px;vertical-align:middle;letter-spacing:.08em}
@keyframes glow{0%{box-shadow:0 0 0 3px var(--mint)}100%{box-shadow:0 2px 8px rgba(34,134,165,.08)}}
.empty{text-align:center;padding:60px 20px;color:#7A93A0}
.empty .icon{font-size:40px;margin-bottom:10px}
#panel{display:none}
</style>
</head>

  <div id="login">

</div>

<script>
/* ================= CONFIG ================= */
const WORKER_URL = "https://minato-monshin.minato-monshin.workers.dev"; // ← Cloudflare WorkerのURLに変更
/* ========================================== */

const JA = {
sym:{fever:"発熱",cough:"咳",sorethroat:"のどの痛み",runnynose:"鼻水",headache:"頭痛",stomachache:"腹痛",diarrhea:"下痢",nausea:"吐き気・嘔吐",skin:"皮膚の症状",injury:"けが",vaccine:"予防接種",checkup:"健診・検査"},
his:{none:"なし",hypertension:"高血圧",diabetes:"糖尿病",asthma:"喘息",heart:"心臓病",stroke:"脳卒中",cancer:"がん",liver:"肝臓病",kidney:"腎臓病"},
alg:{none:"なし",drug:"薬",food:"食物",otherallergy:"その他"},
langName:{ja:"日本語",en:"English",zh:"中文",pt:"Português",th:"ไทย",es:"Español"}
};
const $=id=>document.getElementById(id);
let SEEN = new Set(), FIRST = true;
function chime(){
  try{
    const a=new (window.AudioContext||window.webkitAudioContext)();
    [[880,0],[1174.7,.18]].forEach(([f,t])=>{
      const o=a.createOscillator(),g=a.createGain();
      o.type="sine";o.frequency.value=f;o.connect(g);g.connect(a.destination);
      g.gain.setValueAtTime(.0001,a.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.18,a.currentTime+t+.02);
      g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+t+.55);
      o.start(a.currentTime+t);o.stop(a.currentTime+t+.6);
    });
  }catch(_){}
}
let PASS = sessionStorage.getItem("monshin_pass") || "";

async function api(path,opts={}){
  opts.headers = Object.assign({"X-Passcode":PASS},opts.headers||{});
  const r = await fetch(WORKER_URL+path,opts);
  if(r.status===401) throw {auth:true};
  if(!r.ok) throw new Error("api");
  return r.json();
}

function fmtDob(iso){
  if(!iso) return "(未入力)";
  const [y,m,d]=iso.split("-");
  return `${y}/${m}/${d}`;
}
function ageFrom(iso){
  if(!iso) return "";
  const b=new Date(iso), n=new Date();
  let a=n.getFullYear()-b.getFullYear();
  if(n.getMonth()<b.getMonth()||(n.getMonth()===b.getMonth()&&n.getDate()<b.getDate()))a--;
  return `${a}歳`;
}
function fullAddr(e){
  if(e.jpAddress){
    const z = e.zip ? `〒${e.zip.slice(0,3)}-${e.zip.slice(3)} ` : "";
    return `${z}${e.jpAddress} ${e.address||""}`.trim();
  }
  return e.address || "(未入力)";
}
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}

/* 診察情報まとめテキスト(Dynamicsの診察ページに貼る) */
function clinicalText(e){
  const sym = e.symptoms.map(k=>JA.sym[k]||k).join("、");
  const reason = [sym, e.reasonFree].filter(Boolean).join(" / ");
  const his = [ ...e.history.map(k=>JA.his[k]||k), e.historyFree ].filter(Boolean).join("、") || "記載なし";
  let alg = e.allergy.map(k=>JA.alg[k]||k).join("、") || "記載なし";
  if(e.allergyFree) alg += `(${e.allergyFree})`;
  let out = `【受診理由】${reason}【既往歴】${his}【アレルギー】${alg}`;
  if(e.weight) out += `【体重】${e.weight}kg`;
  return out;
}

function render(list){
  const c=$("cards"); c.innerHTML="";
  $("count").textContent = `未確認 ${list.length} 件`;
  document.title = list.length ? `(${list.length}) 問診受付パネル` : "問診受付パネル";
  const fresh = list.filter(e=>!SEEN.has(e.code));
  if(!FIRST && fresh.length>0) chime();
  list.forEach(e=>SEEN.add(e.code));
  if(list.length===0){
    c.innerHTML = `<div class="empty"><div class="icon">🌊</div>新しい問診はありません</div>`;
    FIRST=false;
    return;
  }
  list.sort((a,b)=>a.createdAt<b.createdAt?1:-1);
  list.forEach(e=>{
    const card=document.createElement("div");
    card.className="card"+(fresh.some(f=>f.code===e.code)&&!FIRST?" is-new":"");
    const time=new Date(e.createdAt).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
    const clin=clinicalText(e);
    card.innerHTML = `
      <div class="card-head">
        <div class="code">${esc(e.code)}</div>
        <div class="meta"><b>${esc(e.name||"(氏名未入力)")}</b><br>${time} 送信 / ${fmtDob(e.dob)} (${ageFrom(e.dob)})</div>
        <span class="lang-tag">${JA.langName[e.lang]||e.lang}</span>
        <span class="chev">›</span>
      </div>
      <div class="card-body">
        <div class="dob-line">生年月日: <b>${fmtDob(e.dob)}</b> (${ageFrom(e.dob)}) → カルテ表紙へ手入力</div>
        <div class="copy-block">
          <div class="copy-label"><span>氏名(カルテ表紙へ)</span><button class="btn-copy" data-copy="name">コピー</button></div>
          <pre data-text="name">${esc(e.name||"(未入力)")}</pre>
        </div>
        <div class="copy-block">
          <div class="copy-label"><span>住所(カルテ表紙へ)</span><button class="btn-copy" data-copy="addr">コピー</button></div>
          <pre data-text="addr">${esc(fullAddr(e))}</pre>
          ${e.lang!=="ja" ? `<p class="foreign-note">※ 患者記入の原文です(${JA.langName[e.lang]})。保険証と表記の確認を。</p>`:""}
        </div>
        <div class="copy-block">
          <div class="copy-label"><span>電話番号(カルテ表紙へ)</span><button class="btn-copy" data-copy="phone">コピー</button></div>
          <pre data-text="phone">${esc(e.phone||"(未入力)")}</pre>
        </div>
        <div class="copy-block">
          <div class="copy-label"><span>診察情報(診察ページへ)</span><button class="btn-copy" data-copy="clin">コピー</button></div>
          <pre data-text="clin">${esc(clin)}</pre>
        </div>
        <button class="btn-del">確認済み → 削除</button>
      </div>`;
    card.querySelector(".card-head").addEventListener("click",()=>card.classList.toggle("open"));
    card.querySelectorAll(".btn-copy").forEach(btn=>{
      btn.addEventListener("click",async ev=>{
        ev.stopPropagation();
        const key=btn.dataset.copy;
        const text = key==="addr" ? fullAddr(e) : key==="phone" ? (e.phone||"") : key==="name" ? (e.name||"") : clin;
        try{ await navigator.clipboard.writeText(text); }
        catch(_){ /* http環境用フォールバック */ 
          const ta=document.createElement("textarea");ta.value=text;document.body.append(ta);ta.select();document.execCommand("copy");ta.remove();
        }
        btn.textContent="✓ コピーしました"; btn.classList.add("done");
        setTimeout(()=>{btn.textContent="コピー";btn.classList.remove("done");},1800);
      });
    });
    const del=card.querySelector(".btn-del");
    del.addEventListener("click",async ()=>{
      if(!del.classList.contains("confirm")){
        del.classList.add("confirm"); del.textContent="もう一度押すと削除します";
        setTimeout(()=>{del.classList.remove("confirm");del.textContent="確認済み → 削除";},3000);
        return;
      }
      del.disabled=true;
      try{ await api("/item/"+encodeURIComponent(e.code),{method:"DELETE"}); card.remove(); load(); }
      catch(_){ del.disabled=false; }
    });
    c.append(card);
  });
  FIRST=false;
}

async function load(){
  try{
    const d = await api("/list");
    render(d.items||[]);
    $("login").style.display="none"; $("panel").style.display="block";
  }catch(err){
    if(err.auth){
      sessionStorage.removeItem("monshin_pass"); PASS="";
      $("login").style.display="block"; $("panel").style.display="none";
      $("login-err").style.display="block";
    }
  }
}

$("btn-login").addEventListener("click",()=>{
  PASS=$("pass").value.trim();
  sessionStorage.setItem("monshin_pass",PASS);
  $("login-err").style.display="none";
  load();
});
$("pass").addEventListener("keydown",e=>{if(e.key==="Enter")$("btn-login").click();});
$("btn-refresh").addEventListener("click",load);
setInterval(()=>{ if($("panel").style.display==="block") load(); },30000);

if(PASS) load();
</script>
</body>
</html>
