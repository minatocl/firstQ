<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>問診受付パネル | みなとクリニック</title>
<style>
:root{
  --teal:#2286A5;--teal-dark:#0B4A61;--teal-soft:#D9EEF5;
  --bg:#EFF7FB;--ink:#1A3A46;--mint:#2BB59A;--card:#fff;--line:#C5E0EB;--radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.6}
.wrap{max-width:900px;margin:0 auto;padding:24px 20px 80px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:10px}
header img{height:34px}
.head-title{font-size:14px;font-weight:800;color:var(--teal);letter-spacing:.12em}
.wave{display:block;width:100%;height:20px;margin:2px 0 18px}
.badge{display:inline-block;background:var(--teal);color:#fff;font-size:12px;font-weight:700;border-radius:999px;padding:3px 12px}

/* login */
#login{max-width:360px;margin:60px auto;background:var(--card);border-radius:var(--radius);padding:30px;box-shadow:0 2px 12px rgba(34,134,165,.1);text-align:center}
#login h2{font-size:17px;color:var(--teal-dark);margin-bottom:16px}
input[type=password]{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px;font-size:16px;text-align:center;letter-spacing:.3em}
input:focus{outline:none;border-color:var(--teal)}
button{font-family:inherit;cursor:pointer}
.btn{border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:700;transition:.12s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--teal);color:#fff;width:100%;margin-top:14px}
.err{color:#B03A3A;font-size:13px;margin-top:10px;display:none}

/* list */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.btn-manual{background:var(--teal);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13.5px;font-weight:700;margin-right:8px;cursor:pointer}
.manual-panel{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 8px rgba(34,134,165,.08);padding:18px;margin-bottom:14px}
.mi-title{font-size:15px;font-weight:800;color:var(--teal-dark);margin-bottom:6px}
.mi-sub{font-size:12.5px;color:#5B7E8C;margin-bottom:12px;line-height:1.6}
.mi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;margin-bottom:12px}
.mi-grid label{font-size:12.5px;font-weight:700;color:var(--teal)}
.mi-grid input,.mi-grid select{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;background:#F7FCFE;margin-top:4px}
.mi-grid input:focus,.mi-grid select:focus{outline:none;border-color:var(--teal);background:#fff}
.mi-ok{color:#1E7B4F;font-size:13.5px;font-weight:700;margin-top:10px}
.count{font-size:14px;color:#4A6B78;font-weight:600}
.btn-refresh{background:#fff;border:1.5px solid var(--line);color:var(--teal);border-radius:10px;padding:8px 16px;font-size:13.5px;font-weight:700}
/* 種別タブ(新患 / 電子診察券発行希望 の切り替え) */
.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tab{background:#fff;border:1.5px solid var(--line);color:#5B7E8C;border-radius:999px;padding:9px 16px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:.12s}
.tab:active{transform:scale(.97)}
.tab .tab-n{background:#EDF3F6;color:#5B7E8C;border-radius:999px;padding:1px 8px;font-size:12px;font-weight:800;min-width:22px;text-align:center}
.tab[data-filter="all"].active{background:var(--teal);border-color:var(--teal);color:#fff}
.tab[data-filter="all"].active .tab-n{background:rgba(255,255,255,.28);color:#fff}
.tab[data-filter="monshin"]{color:var(--teal-dark);border-color:#BFE0EC}
.tab[data-filter="monshin"].active{background:var(--teal);border-color:var(--teal);color:#fff}
.tab[data-filter="monshin"].active .tab-n{background:rgba(255,255,255,.28);color:#fff}
.tab[data-filter="card"]{color:#5B4FB0;border-color:#D6CFF0}
.tab[data-filter="card"] .tab-n{background:#EFEAFB;color:#5B4FB0}
.tab[data-filter="card"].active{background:#5B4FB0;border-color:#5B4FB0;color:#fff}
.tab[data-filter="card"].active .tab-n{background:rgba(255,255,255,.28);color:#fff}
.cards{display:grid;gap:14px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 8px rgba(34,134,165,.08);overflow:hidden}
.card-head{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;user-select:none}
.card-head:hover{background:#F6FBFD}
.code{font-size:26px;font-weight:900;font-style:italic;color:var(--teal-dark);letter-spacing:.05em;min-width:86px}
.meta{flex:1;font-size:13px;color:#4A6B78}
.meta b{color:var(--ink);font-size:14px}
.lang-tag{background:var(--teal-soft);color:var(--teal-dark);font-size:11.5px;font-weight:700;border-radius:6px;padding:2px 8px}
.chev{color:var(--teal);font-size:18px;transition:.2s}
.card.open .chev{transform:rotate(90deg)}
.card-body{display:none;border-top:1.5px solid var(--line);padding:16px 18px 20px;background:#FBFEFF}
.card.open .card-body{display:block}

.copy-block{margin-bottom:16px}
.copy-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.copy-label span{font-size:12.5px;font-weight:800;color:var(--teal);letter-spacing:.08em}
.btn-copy{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700}
.btn-copy.done{background:var(--mint)}
pre{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-family:inherit;font-size:14.5px;white-space:pre-wrap;word-break:break-all}
.dob-line{font-size:15px;margin-bottom:16px;background:var(--teal-soft);border-radius:10px;padding:10px 14px}
.dob-line b{font-size:18px;font-style:italic}
.foreign-note{font-size:12px;color:#7A93A0;margin-top:5px}
.btn-del{background:#fff;border:1.5px solid #E0A5A5;color:#B03A3A;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:700;width:100%}
.btn-del.confirm{background:#B03A3A;color:#fff;border-color:#B03A3A}
.card.is-new{animation:glow 2.6s ease}
.card.is-new .code::after{content:"NEW";font-size:10px;font-style:normal;font-weight:800;background:var(--mint);color:#fff;border-radius:5px;padding:2px 6px;margin-left:8px;vertical-align:middle;letter-spacing:.08em}
@keyframes glow{0%{box-shadow:0 0 0 3px var(--mint)}100%{box-shadow:0 2px 8px rgba(34,134,165,.08)}}

/* 電子診察券発行希望(既存患者のオンサイト申し込み) */
.card.kind-card{border-left:5px solid #5B4FB0}
.tag-card{background:#5B4FB0;color:#fff;font-size:11px;font-weight:800;border-radius:6px;padding:4px 9px;letter-spacing:.02em;white-space:nowrap;line-height:1.35;text-align:center}
.meta .kana{font-weight:600;color:#4A6B78}

.empty{text-align:center;padding:60px 20px;color:#7A93A0}
.empty .icon{font-size:40px;margin-bottom:10px}

/* デジタル診察券 発行 */
.card-issue{background:#F3F0FB;border:1.5px solid #D6CFF0;border-radius:12px;padding:12px 14px;margin-bottom:16px}
.card-issue .copy-label span:first-child{color:#4A3F86}
.issue-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.chartno-input{flex:1;border:1.5px solid #C9BEEA;border-radius:9px;padding:10px 12px;font-size:15px;font-family:inherit;letter-spacing:.05em;background:#fff;text-align:left}
.chartno-input:focus{outline:none;border-color:#5B4FB0}
.btn-issue{background:#5B4FB0;color:#fff;border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:700;white-space:nowrap}
.btn-issue:disabled{opacity:.55}
.btn-issue.reissue{background:#fff;color:#5B4FB0;border:1.5px solid #5B4FB0}
.card-status{font-size:12px;font-weight:800;border-radius:6px;padding:2px 9px}
.st-none{background:#E6E0F5;color:#6A5FA8}
.st-issued{background:#DCEFE9;color:#1F7A63}
.st-added{background:#2BB59A;color:#fff}
.st-expired{background:#F3D9D9;color:#B03A3A}
.issue-note{font-size:11.5px;color:#8A7FB8;margin-top:7px}

/* 発行確認ダイアログ */
#issue-modal{display:none;position:fixed;inset:0;background:rgba(20,16,50,.5);z-index:100;align-items:center;justify-content:center;padding:20px}
.mdl{background:#fff;border-radius:18px;max-width:380px;width:100%;padding:26px 24px;box-shadow:0 12px 40px rgba(38,32,85,.35);text-align:center}
.mdl-title{font-size:16px;font-weight:800;color:#5B4FB0;margin-bottom:18px}
.mdl-name{font-size:26px;font-weight:900;color:#1A1440;line-height:1.25;margin-bottom:4px;word-break:break-all}
.mdl-sub{font-size:12.5px;color:#7A8894;margin-bottom:18px}
.mdl-chart-label{font-size:12px;font-weight:800;color:#8A7FB8;letter-spacing:.1em;margin-bottom:4px}
.mdl-chart{font-size:40px;font-weight:900;font-style:italic;letter-spacing:.08em;color:#262055;background:#F3F0FB;border-radius:12px;padding:10px 0;margin-bottom:22px}
.mdl-btns{display:flex;gap:10px}
.mdl-btns button{flex:1;border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer}
.mdl-cancel{background:#EDF0F2;color:#5B7E8C}
.mdl-ok{background:#5B4FB0;color:#fff}
.mdl-btns button:active{transform:scale(.97)}

#panel{display:none}
</style>
</head>

<script>
/* ================= CONFIG ================= */
const WORKER_URL = "https://minato-monshin.minato-monshin.workers.dev"; // ← Cloudflare WorkerのURLに変更
/* デジタル診察券用 Worker(minato-card)。デプロイ時に実URLへ差し替える。
   動作確認時は ?cardapi=http://127.0.0.1:8787 で上書き可能。 */
const CARD_API = new URLSearchParams(location.search).get("cardapi")
  || "https://minato-card.minato-monshin.workers.dev";
/* 患者呼び出しシステム(minato-call、待合室PCのLANサーバー)。
   診察券発行時に、日本語以外の患者の呼び出しアナウンス言語を自動登録する。
   ?callapi=... で上書き可能。?callapi= (空)で無効化。 */
const CALL_SERVER = new URLSearchParams(location.search).get("callapi")
  ?? "http://192.168.1.11:8787";
/* firstQの言語コード → 呼び出しシステムの言語コード */
const CALL_LANG_MAP = { zh: "zh-CN" };
/* ========================================== */

const JA = {
sym:{fever:"発熱",cough:"咳",sorethroat:"のどの痛み",runnynose:"鼻水",headache:"頭痛",stomachache:"腹痛",diarrhea:"下痢",nausea:"吐き気・嘔吐",skin:"皮膚の症状",injury:"けが",vaccine:"予防接種",checkup:"健診・検査"},
his:{none:"なし",hypertension:"高血圧",diabetes:"糖尿病",asthma:"喘息",heart:"心臓病",stroke:"脳卒中",cancer:"がん",liver:"肝臓病",kidney:"腎臓病"},
alg:{none:"なし",drug:"薬",food:"食物",otherallergy:"その他"},
langName:{ja:"日本語",en:"English",zh:"中文",pt:"Português",th:"ไทย",es:"Español"}
};
const $=id=>document.getElementById(id);
let SEEN = new Set(), FIRST = true;
let FILTER = "all";        // すべて / monshin(新患) / card(電子診察券発行希望)
let LAST_ITEMS = [];       // 直近の一覧(タブ切替時に再取得せず描画するため)
function chime(){
  try{
    const a=new (window.AudioContext||window.webkitAudioContext)();
    [[880,0],[1174.7,.18]].forEach(([f,t])=>{
      const o=a.createOscillator(),g=a.createGain();
      o.type="sine";o.frequency.value=f;o.connect(g);g.connect(a.destination);
      g.gain.setValueAtTime(.0001,a.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.18,a.currentTime+t+.02);
      g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+t+.55);
      o.start(a.currentTime+t);o.stop(a.currentTime+t+.6);
    });
  }catch(_){}
}
let PASS = sessionStorage.getItem("monshin_pass") || "";

async function api(path,opts={}){
  opts.headers = Object.assign({"X-Passcode":PASS},opts.headers||{});
  const r = await fetch(WORKER_URL+path,opts);
  if(r.status===401) throw {auth:true};
  if(!r.ok) throw new Error("api");
  return r.json();
}

/* デジタル診察券 Worker(minato-card)呼び出し */
let CARD_STATUS = {}; // code -> {chartNo,status,issuedAt,expiresAt}
async function cardApi(path,opts={}){
  opts.headers = Object.assign({"X-Passcode":PASS,"Content-Type":"application/json"},opts.headers||{});
  const r = await fetch(CARD_API+path,opts);
  if(!r.ok) throw new Error("cardapi "+r.status);
  return r.json();
}
async function loadCardStatuses(codes){
  CARD_STATUS = {};
  if(!codes.length) return;
  try{
    const d = await cardApi("/api/card/statuses",{method:"POST",body:JSON.stringify({codes})});
    CARD_STATUS = d.statuses || {};
  }catch(_){ /* カードWorker未設定でも問診パネルは動く */ }
}
const ST_LABEL={issued:"発行済み",added:"追加済み",expired:"期限切れ"};
const ST_CLASS={issued:"st-issued",added:"st-added",expired:"st-expired"};

/* 発行確認ダイアログ → 確定で実際に発行 */
function openIssueConfirm(entry, chartNo, ui){
  const isReissue = ui.issueBtn.classList.contains("reissue");
  $("mdl-title").textContent = isReissue ? "診察券を再発行します" : "診察券を発行します";
  $("mdl-name").textContent = entry.name || "(氏名未入力)";
  $("mdl-sub").textContent = "生年月日 "+fmtDob(entry.dob)+" / 電話 "+(entry.phone||"—");
  $("mdl-chart").textContent = chartNo;
  const overlay = $("issue-modal");
  overlay.style.display = "flex";
  overlay.onclick = ev=>{ if(ev.target===overlay) overlay.style.display="none"; };
  $("mdl-cancel").onclick = ()=>{ overlay.style.display="none"; };
  $("mdl-ok").onclick = ()=>{ overlay.style.display="none"; doIssue(entry, chartNo, ui); };
}
async function doIssue(entry, chartNo, ui){
  const {issueBtn, chartInput, stEl} = ui;
  const orig = issueBtn.classList.contains("reissue") ? "再発行" : "発行";
  issueBtn.disabled=true; issueBtn.textContent="…";
  try{
    const d=await cardApi("/api/card/issue",{method:"POST",body:JSON.stringify({
      code:entry.code, chartNo, name:entry.name||"", phone:entry.phone||"", dob:entry.dob||"", lang:entry.lang||"ja"
    })});
    if(d.ok){
      CARD_STATUS[entry.code]={chartNo:d.chartNo,status:d.status,issuedAt:d.issuedAt,expiresAt:d.expiresAt};
      chartInput.value=d.chartNo;
      stEl.textContent=ST_LABEL[d.status]||d.status;
      stEl.className="card-status "+(ST_CLASS[d.status]||"");
      issueBtn.textContent="再発行"; issueBtn.classList.add("reissue");
      registerCallLang(entry, d.chartNo, issueBtn); // 呼び出しアナウンス言語の自動登録(非同期・失敗しても発行は成立)
    } else {
      issueBtn.textContent=orig;
      alert("発行に失敗しました: "+(d.error==="invalid_chartNo"?"カルテ番号は数字5桁で入力してください":(d.error||"")));
    }
  }catch(err){ issueBtn.textContent=orig; alert("通信エラー。カードWorkerのURL設定をご確認ください。"); }
  finally{ issueBtn.disabled=false; }
}

/* カルテ番号の正規化: 数字以外を除去し、頭の0を外す(古い患者は3〜4桁。
   0埋め5桁で入力されても、保存・QRは本来の桁数にする) */
function normalizeChartNo(s){
  return String(s || "").replace(/\D/g, "").replace(/^0+(?=\d)/, "");
}

/* Dynamicsからのコピー貼り付けをカルテ番号(5桁)に変換する。
   対応: ①5桁そのまま ②受付一覧の行コピー(ヘッダー付きタブ区切り) ③「489500.00」形式の単独値
   カルテ番号フィールドは「5桁カルテ番号+枝番1桁.小数部」なので、小数部除去→末尾1桁(枝番)を捨てる */
function extractChartNo(text){
  if(!text) return null;
  const t = text.trim();
  if(/^\d{1,5}$/.test(t)) return normalizeChartNo(t);
  const lines = t.split(/\r?\n/);
  const hi = lines.findIndex(l => l.includes("カルテ番号"));
  if(hi >= 0){
    const cols = lines[hi].split("\t").map(s => s.trim());
    const ci = cols.indexOf("カルテ番号");
    if(ci >= 0){
      for(let i = hi + 1; i < lines.length; i++){
        if(!lines[i].trim()) continue;
        const raw = (lines[i].split("\t")[ci] || "").trim();
        const m = raw.match(/^(\d{2,10})(?:\.\d+)?$/);
        return m ? normalizeChartNo(m[1].slice(0, -1)) : null;
      }
    }
    return null;
  }
  const m = t.match(/(\d{2,10})\.\d+/); // 「489500.00」形式(古い患者は「1230.00」など短い)
  return m ? normalizeChartNo(m[1].slice(0, -1)) : null;
}

/* カルテ番号入力欄: Dynamicsの行をそのまま貼り付けても番号だけ入るようにする */
function attachChartPaste(input){
  input.addEventListener("paste",(e)=>{
    const text = (e.clipboardData || window.clipboardData).getData("text");
    const no = extractChartNo(text);
    if(no){
      e.preventDefault();
      input.value = no;
      input.style.borderColor = "#2BB59A";
      setTimeout(()=>{ input.style.borderColor = ""; }, 1500);
    }
  });
}

/* 患者呼び出しシステムへ言語を登録(待合室で呼ばれるとき、その言語でもアナウンスされる) */
async function registerCallLang(entry, chartNo, issueBtn){
  const lang = entry.lang || "ja";
  if(!CALL_SERVER || lang === "ja") return; // 日本語の患者は登録不要(既定で日本語)
  const note = issueBtn.closest(".card-issue")?.querySelector(".issue-note");
  try{
    const r = await fetch(CALL_SERVER + "/exceptions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ karte: chartNo, ttsName: entry.name || "", lang: CALL_LANG_MAP[lang] || lang })
    });
    const d = await r.json();
    if(note) note.textContent = d.ok
      ? `✓ 呼び出しアナウンス言語(${JA.langName[lang]||lang})を待合室に登録しました`
      : `⚠ 呼び出し言語を登録できませんでした: ${d.error||""}`;
  }catch(_){
    if(note) note.textContent = "⚠ 待合室の呼び出しサーバーに接続できず、言語を登録できませんでした(診察券の発行は完了しています)";
  }
}

function fmtDob(iso){
  if(!iso) return "(未入力)";
  const [y,m,d]=iso.split("-");
  return `${y}/${m}/${d}`;
}
function ageFrom(iso){
  if(!iso) return "";
  const b=new Date(iso), n=new Date();
  let a=n.getFullYear()-b.getFullYear();
  if(n.getMonth()<b.getMonth()||(n.getMonth()===b.getMonth()&&n.getDate()<b.getDate()))a--;
  return `${a}歳`;
}
function fullAddr(e){
  if(e.jpAddress){
    const z = e.zip ? `〒${e.zip.slice(0,3)}-${e.zip.slice(3)} ` : "";
    return `${z}${e.jpAddress} ${e.address||""}`.trim();
  }
  return e.address || "(未入力)";
}
function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}

/* 診察情報まとめテキスト(Dynamicsの診察ページに貼る) */
function clinicalText(e){
  const sym = e.symptoms.map(k=>JA.sym[k]||k).join("、");
  const reason = [sym, e.reasonFree].filter(Boolean).join(" / ");
  const his = [ ...e.history.map(k=>JA.his[k]||k), e.historyFree ].filter(Boolean).join("、") || "記載なし";
  let alg = e.allergy.map(k=>JA.alg[k]||k).join("、") || "記載なし";
  if(e.allergyFree) alg += `(${e.allergyFree})`;
  let out = `【受診理由】${reason}【既往歴】${his}【アレルギー】${alg}`;
  if(e.weight) out += `【体重】${e.weight}kg`;
  return out;
}

function render(list){
  LAST_ITEMS = list;
  const c=$("cards"); c.innerHTML="";
  // 種別カウント(タブのバッジ)。card=電子診察券発行希望 / それ以外=新患
  const nCard = list.filter(e=>e.kind==="card").length;
  const nMon = list.length - nCard;
  $("tabn-all").textContent = list.length;
  $("tabn-monshin").textContent = nMon;
  $("tabn-card").textContent = nCard;
  // 新着チャイム・既読管理は全件で判定(絞り込み中でも新着を逃さない)
  const fresh = list.filter(e=>!SEEN.has(e.code));
  if(!FIRST && fresh.length>0) chime();
  list.forEach(e=>SEEN.add(e.code));
  // タブで表示を絞り込む
  const view = FILTER==="card" ? list.filter(e=>e.kind==="card")
             : FILTER==="monshin" ? list.filter(e=>e.kind!=="card")
             : list;
  $("count").textContent = `未確認 ${view.length} 件` + (FILTER!=="all" ? `（全${list.length}）` : "");
  document.title = list.length ? `(${list.length}) 問診受付パネル` : "問診受付パネル";
  if(view.length===0){
    const msg = list.length===0 ? "新しい問診はありません"
      : FILTER==="card" ? "電子診察券の発行希望はありません"
      : "新患の問診はありません";
    c.innerHTML = `<div class="empty"><div class="icon">🌊</div>${msg}</div>`;
    FIRST=false;
    return;
  }
  view.sort((a,b)=>a.createdAt<b.createdAt?1:-1);
  view.forEach(e=>{
    const isCard = e.kind === "card"; // 電子診察券発行希望(既存患者)
    const card=document.createElement("div");
    card.className="card"+(fresh.some(f=>f.code===e.code)&&!FIRST?" is-new":"")+(isCard?" kind-card":"");
    const time=new Date(e.createdAt).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
    const clin=isCard?"":clinicalText(e); // 発行希望は症状等を持たないため算出しない
    const cs = CARD_STATUS[e.code];
    const stKey = cs && cs.status;
    const stBadge = stKey
      ? `<span class="card-status ${ST_CLASS[stKey]||''}">${ST_LABEL[stKey]||stKey}</span>`
      : `<span class="card-status st-none">未発行</span>`;
    const issueBlock = `
        <div class="copy-block card-issue">
          <div class="copy-label"><span>デジタル診察券</span>${stBadge}</div>
          <div class="issue-row">
            <input class="chartno-input" inputmode="numeric" maxlength="5" placeholder="カルテ番号(5桁)" value="${cs?esc(cs.chartNo):''}">
            <button class="btn-issue ${cs?'reissue':''}">${cs?'再発行':'発行'}</button>
          </div>
          <div class="issue-note">氏名・電話・生年月日は問診データから自動送信。番号は枝番なしの数字(古い患者は3〜4桁のまま。頭に0を付けて入力しても保存時に外れます)。<b>Dynamicsで患者の行をコピー(Ctrl+C)してこの欄に貼り付けると、番号だけが自動で入ります。</b>番号を変えて再発行すると旧番号は無効になります。</div>
        </div>`;
    const metaName = isCard && e.kana
      ? `<b>${esc(e.name||"(氏名未入力)")}</b> <span class="kana">(${esc(e.kana)})</span>`
      : `<b>${esc(e.name||"(氏名未入力)")}</b>`;
    // 電子診察券発行希望の行: 臨床項目(症状・住所・診察情報)は表示せず、
    // 本人確認と発行に必要な 氏名/フリガナ/電話/生年月日 + 発行ボックスのみ。
    const cardKindBody = `
        <div class="dob-line">生年月日: <b>${fmtDob(e.dob)}</b> (${ageFrom(e.dob)})</div>
        <div class="copy-block">
          <div class="copy-label"><span>氏名</span><button class="btn-copy" data-copy="name">コピー</button></div>
          <pre data-text="name">${esc(e.name||"(未入力)")}</pre>
        </div>
        ${e.kana ? `<div class="copy-block">
          <div class="copy-label"><span>フリガナ</span><button class="btn-copy" data-copy="kana">コピー</button></div>
          <pre data-text="kana">${esc(e.kana)}</pre>
        </div>` : ""}
        <div class="copy-block">
          <div class="copy-label"><span>電話番号(受け取りの本人確認に使用)</span><button class="btn-copy" data-copy="phone">コピー</button></div>
          <pre data-text="phone">${esc(e.phone||"(未入力)")}</pre>
        </div>
        ${issueBlock}
        <button class="btn-del">確認済み → 削除</button>`;
    const monshinBody = `
        <div class="dob-line">生年月日: <b>${fmtDob(e.dob)}</b> (${ageFrom(e.dob)}) → カルテ表紙へ手入力</div>
        <div class="copy-block">
          <div class="copy-label"><span>氏名(カルテ表紙へ)</span><button class="btn-copy" data-copy="name">コピー</button></div>
          <pre data-text="name">${esc(e.name||"(未入力)")}</pre>
        </div>
        <div class="copy-block">
          <div class="copy-label"><span>住所(カルテ表紙へ)</span><button class="btn-copy" data-copy="addr">コピー</button></div>
          <pre data-text="addr">${esc(fullAddr(e))}</pre>
          ${e.lang!=="ja" ? `<p class="foreign-note">※ 患者記入の原文です(${JA.langName[e.lang]})。保険証と表記の確認を。</p>`:""}
        </div>
        <div class="copy-block">
          <div class="copy-label"><span>電話番号(カルテ表紙へ)</span><button class="btn-copy" data-copy="phone">コピー</button></div>
          <pre data-text="phone">${esc(e.phone||"(未入力)")}</pre>
        </div>
        <div class="copy-block">
          <div class="copy-label"><span>診察情報(診察ページへ)</span><button class="btn-copy" data-copy="clin">コピー</button></div>
          <pre data-text="clin">${esc(clin)}</pre>
        </div>
        ${issueBlock}
        <button class="btn-del">確認済み → 削除</button>`;
    card.innerHTML = `
      <div class="card-head">
        ${isCard ? `<span class="tag-card">電子診察券<br>発行希望</span>` : ""}
        <div class="code">${esc(e.code)}</div>
        <div class="meta">${metaName}<br>${time} 送信 / ${fmtDob(e.dob)} (${ageFrom(e.dob)})</div>
        <span class="lang-tag">${JA.langName[e.lang]||e.lang}</span>
        <span class="chev">›</span>
      </div>
      <div class="card-body">${isCard ? cardKindBody : monshinBody}</div>`;
    card.querySelector(".card-head").addEventListener("click",()=>card.classList.toggle("open"));
    card.querySelectorAll(".btn-copy").forEach(btn=>{
      btn.addEventListener("click",async ev=>{
        ev.stopPropagation();
        const key=btn.dataset.copy;
        const text = key==="addr" ? fullAddr(e) : key==="phone" ? (e.phone||"") : key==="name" ? (e.name||"") : key==="kana" ? (e.kana||"") : clin;
        try{ await navigator.clipboard.writeText(text); }
        catch(_){ /* http環境用フォールバック */ 
          const ta=document.createElement("textarea");ta.value=text;document.body.append(ta);ta.select();document.execCommand("copy");ta.remove();
        }
        btn.textContent="✓ コピーしました"; btn.classList.add("done");
        setTimeout(()=>{btn.textContent="コピー";btn.classList.remove("done");},1800);
      });
    });
    const issueBtn=card.querySelector(".btn-issue");
    const chartInput=card.querySelector(".chartno-input");
    attachChartPaste(chartInput);
    const stEl=card.querySelector(".card-status");
    issueBtn.addEventListener("click",()=>{
      const chartNo=normalizeChartNo(chartInput.value);
      chartInput.value=chartNo;
      if(!/^\d{1,5}$/.test(chartNo)){ chartInput.focus(); chartInput.style.borderColor="#B03A3A"; return; }
      chartInput.style.borderColor="";
      openIssueConfirm(e, chartNo, {issueBtn, chartInput, stEl});
    });

    const del=card.querySelector(".btn-del");
    del.addEventListener("click",async ()=>{
      if(!del.classList.contains("confirm")){
        del.classList.add("confirm"); del.textContent="もう一度押すと削除します";
        setTimeout(()=>{del.classList.remove("confirm");del.textContent="確認済み → 削除";},3000);
        return;
      }
      del.disabled=true;
      try{ await api("/item/"+encodeURIComponent(e.code),{method:"DELETE"}); card.remove(); load(); }
      catch(_){ del.disabled=false; }
    });
    c.append(card);
  });
  FIRST=false;
}

async function load(){
  try{
    const d = await api("/list");
    const items = d.items||[];
    if($("panel").style.display!=="block"){
      // ログイン直後は診察券の発行状態を待たずにまず一覧を表示する
      render(items);
      $("login").style.display="none"; $("panel").style.display="block";
    }
    await loadCardStatuses(items.map(e=>e.code));
    render(items);
    $("login").style.display="none"; $("panel").style.display="block";
  }catch(err){
    if(err.auth){
      sessionStorage.removeItem("monshin_pass"); PASS="";
      $("login").style.display="block"; $("panel").style.display="none";
      $("login-err").style.display="block";
    }
  }
}

$("btn-login").addEventListener("click",()=>{
  PASS=$("pass").value.trim();
  sessionStorage.setItem("monshin_pass",PASS);
  $("login-err").style.display="none";
  load();
});
$("pass").addEventListener("keydown",e=>{if(e.key==="Enter")$("btn-login").click();});
$("btn-refresh").addEventListener("click",load);

// 種別タブ: 再取得せず直近データを絞り込んで描画(APIを叩かない)
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  FILTER = t.dataset.filter;
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active", x===t));
  render(LAST_ITEMS);
}));

/* ---- 手動発行(問診なしの既存患者) ---- */
$("btn-manual").addEventListener("click",()=>{
  const p=$("manual-issue");
  const open=p.style.display!=="none";
  p.style.display=open?"none":"block";
  $("btn-manual").textContent=open?"＋ 手動発行":"× 閉じる";
});
attachChartPaste($("mi-chart"));
$("mi-issue").addEventListener("click", async ()=>{
  const chartNo=normalizeChartNo($("mi-chart").value);
  $("mi-chart").value=chartNo;
  const name=$("mi-name").value.trim();
  const phone=$("mi-phone").value.trim();
  const dob=$("mi-dob").value; // YYYY-MM-DD
  const lang=$("mi-lang").value;
  const err=$("mi-err"), ok=$("mi-ok");
  err.style.display="none"; ok.style.display="none";
  if(!/^\d{1,5}$/.test(chartNo)){ err.textContent="カルテ番号は数字で入力してください(最大5桁・枝番なし。古い番号は3〜4桁のままでも頭に0を付けてもOK)"; err.style.display="block"; return; }
  if(!name||!phone||!dob){ err.textContent="氏名・電話番号・生年月日をすべて入力してください"; err.style.display="block"; return; }
  const btn=$("mi-issue"); btn.disabled=true; btn.textContent="…";
  try{
    // code は「manual-カルテ番号」の固有値。問診由来のコードと衝突せず、
    // 同じ患者への再発行は上書きとして扱われる。
    const d=await cardApi("/api/card/issue",{method:"POST",body:JSON.stringify({
      code:"manual-"+chartNo, chartNo, name, phone, dob, lang
    })});
    if(d.ok){
      ok.textContent=`✓ カルテ番号 ${chartNo}(${name})の診察券を発行しました。患者さんは案内QRから電話番号+生年月日の確認で受け取れます。`;
      ok.style.display="block";
      registerCallLang({lang, name}, chartNo, btn); // 日本語以外なら呼び出し言語も自動登録
      ["mi-chart","mi-name","mi-phone"].forEach(id=>$(id).value="");
      $("mi-dob").value=""; $("mi-lang").value="ja";
    }else{
      err.textContent="発行に失敗しました: "+(d.error==="invalid_chartNo"?"カルテ番号は数字5桁で入力してください":(d.error||""));
      err.style.display="block";
    }
  }catch(_){ err.textContent="通信エラー。ネットワークをご確認ください。"; err.style.display="block"; }
  finally{ btn.disabled=false; btn.textContent="発行する"; }
});
// 自動更新: 90秒間隔。タブが非表示のときはポーリングしない(KV/API負荷を抑制)。
// タブが再び表示になった瞬間は即時更新して、待たせずに最新化する。
setInterval(()=>{ if($("panel").style.display==="block" && !DEMO && !document.hidden) load(); },90000);
document.addEventListener("visibilitychange",()=>{
  if(!document.hidden && $("panel").style.display==="block" && !DEMO) load();
});
