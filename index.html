<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex">
<title>みなとクリニック 問診票 / Medical Questionnaire</title>
<style>
:root{
  --teal:#2286A5;
  --teal-dark:#0B4A61;
  --teal-soft:#D9EEF5;
  --bg-top:#F4FBFE;
  --bg-bottom:#E2F1F8;
  --ink:#1A3A46;
  --mint:#2BB59A;
  --card:#FFFFFF;
  --line:#C5E0EB;
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Kaku Gothic ProN","Noto Sans JP","Noto Sans Thai","Noto Sans SC",sans-serif;
  background:linear-gradient(180deg,var(--bg-top) 0%,var(--bg-bottom) 100%);
  min-height:100vh;color:var(--ink);
  font-size:16px;line-height:1.6;
}
.wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
header{text-align:center;padding:26px 0 6px}
header img{width:min(300px,78%);height:auto}
.wave{display:block;width:100%;height:26px;margin:4px 0 14px}
.tagline{color:var(--teal);font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;text-align:center;margin-bottom:18px}

/* screens */
.screen{display:none;animation:fadein .35s ease}
.screen.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* language select */
.lang-title{text-align:center;font-size:18px;font-weight:700;color:var(--teal-dark);margin-bottom:20px}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.lang-btn{
  background:var(--card);border:2px solid var(--line);border-radius:var(--radius);
  padding:20px 10px;font-size:17px;font-weight:700;color:var(--teal-dark);
  cursor:pointer;transition:.15s;text-align:center;font-family:inherit;
}
.lang-btn small{display:block;font-size:11px;font-weight:500;color:var(--teal);margin-top:3px}
.lang-btn:active{transform:scale(.97);border-color:var(--teal);background:var(--teal-soft)}

/* form */
.section{background:var(--card);border-radius:var(--radius);padding:20px 18px;margin-bottom:16px;box-shadow:0 2px 10px rgba(34,134,165,.07)}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-num{
  flex:none;width:30px;height:30px;border-radius:50%;background:var(--teal);color:#fff;
  font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;
  font-style:italic;
}
.sec-title{font-size:16px;font-weight:800;color:var(--teal-dark)}
.hint{font-size:12.5px;color:#5B7E8C;margin:-8px 0 12px 40px}
.chips{display:flex;flex-wrap:wrap;gap:9px}
.chip{position:relative}
.chip input{position:absolute;opacity:0;width:100%;height:100%;left:0;top:0;cursor:pointer}
.chip span{
  display:inline-block;padding:9px 15px;border-radius:999px;border:1.5px solid var(--line);
  background:#F7FCFE;font-size:14.5px;font-weight:600;color:var(--ink);transition:.12s;user-select:none;
}
.chip input:checked + span{background:var(--teal);border-color:var(--teal);color:#fff}
.chip input:focus-visible + span{outline:3px solid rgba(34,134,165,.4);outline-offset:2px}
textarea,input[type=text],input[type=date],input[type=number]{
  width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;
  font-size:16px;font-family:inherit;background:#F7FCFE;color:var(--ink);margin-top:10px;
}
textarea:focus,input:focus{outline:none;border-color:var(--teal);background:#fff}
textarea{resize:vertical;min-height:70px}
.dob-row{display:flex;gap:8px;margin-top:6px}
.dob-row select{
  flex:1;border:1.5px solid var(--line);border-radius:12px;padding:12px 8px;
  font-size:16px;font-family:inherit;background:#F7FCFE;color:var(--ink);
  -webkit-appearance:none;appearance:none;text-align:center;
}
.dob-row select:focus{outline:none;border-color:var(--teal);background:#fff}
label.field-label{display:block;font-size:13px;font-weight:700;color:var(--teal);margin-top:12px}
.submit-btn{
  width:100%;padding:17px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--teal) 0%,#1A6E8A 100%);color:#fff;
  font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;
  box-shadow:0 4px 14px rgba(34,134,165,.35);transition:.15s;letter-spacing:.03em;
}
.submit-btn:active{transform:scale(.98)}
.submit-btn:disabled{opacity:.5}
.back-link{display:block;text-align:center;margin-top:16px;color:var(--teal);font-size:14px;font-weight:600;background:none;border:none;cursor:pointer;font-family:inherit;width:100%}

/* done screen */
.done-card{background:var(--card);border-radius:var(--radius);padding:34px 22px;text-align:center;box-shadow:0 2px 10px rgba(34,134,165,.07)}
.done-check{width:58px;height:58px;border-radius:50%;background:var(--mint);color:#fff;font-size:30px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.done-title{font-size:19px;font-weight:800;color:var(--teal-dark);margin-bottom:8px}
.done-sub{font-size:14.5px;color:#4A6B78;margin-bottom:22px}
.code-box{
  background:var(--teal-soft);border:2px dashed var(--teal);border-radius:16px;padding:18px;
}
.code-label{font-size:12.5px;font-weight:700;color:var(--teal);letter-spacing:.1em}
.code-num{font-size:52px;font-weight:900;color:var(--teal-dark);font-style:italic;letter-spacing:.08em;line-height:1.2}
.err{background:#FDECEC;border:1.5px solid #E8A0A0;color:#9B3535;border-radius:12px;padding:12px 14px;font-size:14px;margin-bottom:14px;display:none}
.spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-4px;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== animations ===== */
.form-head{text-align:center;margin-bottom:20px;animation:rise .45s ease backwards}
.form-title{font-size:27px;font-weight:900;font-style:italic;color:var(--teal-dark);letter-spacing:.04em}
.form-purpose{font-size:13.5px;color:#4A6B78;margin-top:7px;max-width:420px;margin-left:auto;margin-right:auto}
.wave-g{animation:drift 8s linear infinite}
.wave-g2{animation:drift 13s linear infinite reverse}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(-200px)}}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
#scr-form.active .section{animation:rise .5s ease backwards;animation-delay:calc(var(--i,0)*70ms)}
#scr-lang.active .lang-btn{animation:rise .45s ease backwards}
#scr-lang.active .lang-btn:nth-child(1){animation-delay:.02s}
#scr-lang.active .lang-btn:nth-child(2){animation-delay:.08s}
#scr-lang.active .lang-btn:nth-child(3){animation-delay:.14s}
#scr-lang.active .lang-btn:nth-child(4){animation-delay:.2s}
#scr-lang.active .lang-btn:nth-child(5){animation-delay:.26s}
#scr-lang.active .lang-btn:nth-child(6){animation-delay:.32s}
.chip input:checked + span{animation:pop .28s ease}
@keyframes pop{0%{transform:scale(.9)}55%{transform:scale(1.08)}100%{transform:scale(1)}}
.done-check{animation:pop-in .55s cubic-bezier(.68,-.55,.27,1.55) backwards}
@keyframes pop-in{from{transform:scale(0)}to{transform:scale(1)}}
.code-box{animation:rise .5s .25s ease backwards}
.submit-btn{position:relative;overflow:hidden}
.submit-btn::after{content:"";position:absolute;top:0;left:-80%;width:50%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.35),transparent);animation:shine 3.2s ease-in-out infinite}
@keyframes shine{0%,60%{left:-80%}100%{left:130%}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

es:{formTag:"Cuestionario Médico",q1:"¿Qué le trae hoy a la clínica?",q1hint:"Seleccione todas las opciones que correspondan",q1free:"Detalles (desde cuándo, etc.)",q1ph:"ej.: desde hace 3 días",q2:"Dirección en Japón",formPurpose:"Para agilizar su consulta, indíquenos sus síntomas y alergias con antelación. Toma unos 2 minutos.",qPhone:"Teléfono",qPhonePh:"090-1234-5678",q2ph:"ej.: Naka-ku, Yokohama...",q3:"Fecha de nacimiento",yy:"Año",mm:"Mes",dd:"Día",qw:"Peso del niño/a",qwph:"kg",q4:"Antecedentes médicos",q5:"Alergias",q5detail:"Detalles (nombre del medicamento / alimento)",q5ph:"ej.: penicilina",other:"Otro",send:"Enviar",back:"← Volver a la selección de idioma",doneTitle:"¡Enviado!",doneSub:"¡Gracias! Avise en recepción que envió el cuestionario y muestre este número.",codeLabel:"CÓDIGO DE RECEPCIÓN",errNet:"No se pudo enviar. Inténtelo de nuevo con mejor conexión.",errReq:"Complete el motivo de la visita y la fecha de nacimiento.",

let LANG = "ja";
const $ = id => document.getElementById(id);
const t = k => I18N[LANG][k] || k;

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $(id).classList.add("active");
  window.scrollTo({top:0});
}

function buildChips(containerId, keys, dict, group, exclusiveKey){
  const c = $(containerId); c.innerHTML = "";
  keys.forEach(k=>{
    const l = document.createElement("label"); l.className="chip";
    const i = document.createElement("input"); i.type="checkbox"; i.value=k; i.name=group;
    const s = document.createElement("span"); s.textContent = I18N[LANG][dict][k];
    i.addEventListener("change",()=>{
      if(!exclusiveKey) return;
      const boxes=[...document.querySelectorAll(`input[name=${group}]`)];
      if(i.value===exclusiveKey && i.checked) boxes.forEach(b=>{if(b!==i)b.checked=false;});
      else if(i.checked) boxes.find(b=>b.value===exclusiveKey).checked=false;
    });
    l.append(i,s); c.append(l);
  });
}

function fillDobSelects(){
  const y=$("dob-y"),m=$("dob-m"),d=$("dob-d");
  const mk=(sel,label)=>{sel.innerHTML="";const o=document.createElement("option");o.value="";o.textContent=label;o.disabled=true;o.selected=true;sel.append(o);};
  const yPrev=y.value,mPrev=m.value,dPrev=d.value;
  mk(y,t("yy"));mk(m,t("mm"));mk(d,t("dd"));
  const now=new Date().getFullYear();
  for(let i=now;i>=now-110;i--){const o=document.createElement("option");o.value=i;o.textContent=i;y.append(o);}
  for(let i=1;i<=12;i++){const o=document.createElement("option");o.value=String(i).padStart(2,"0");o.textContent=i;m.append(o);}
  for(let i=1;i<=31;i++){const o=document.createElement("option");o.value=String(i).padStart(2,"0");o.textContent=i;d.append(o);}
  if(yPrev)y.value=yPrev; if(mPrev)m.value=mPrev; if(dPrev)d.value=dPrev;
}
function getDob(){
  const y=$("dob-y").value,m=$("dob-m").value,d=$("dob-d").value;
  if(!y||!m||!d) return "";
  return `${y}-${m}-${d}`;
}
function renderForm(){
  document.querySelectorAll("[data-t]").forEach(el=>el.textContent=t(el.dataset.t));
  fillDobSelects();
  document.querySelectorAll("[data-ph]").forEach(el=>el.placeholder=t(el.dataset.ph));
  buildChips("symptom-chips",SYMPTOMS,"sym","sym");
  buildChips("history-chips",HISTORY,"his","his","none");
  buildChips("allergy-chips",ALLERGY,"alg","alg","none");
}

document.querySelectorAll(".lang-btn").forEach(b=>b.addEventListener("click",()=>{
  LANG=b.dataset.lang; renderForm(); show("scr-form");
}));
$("btn-back").addEventListener("click",()=>show("scr-lang"));

/* show weight field if under 16 (child) */
function updateWeightVisibility(){
  const v=getDob(); if(!v) return;
  const age=(Date.now()-new Date(v).getTime())/(365.25*24*3600*1000);
  $("weight-section").style.display = age<16 ? "block" : "none";
}
["dob-y","dob-m","dob-d"].forEach(id=>$(id).addEventListener("change",updateWeightVisibility));

function checked(group){return [...document.querySelectorAll(`input[name=${group}]:checked`)].map(i=>i.value);}

$("btn-submit").addEventListener("click", async ()=>{
  const err=$("form-err"); err.style.display="none";
  const sym=checked("sym"), reasonFree=$("reason-free").value.trim();
  const dob=getDob();
  if((sym.length===0 && !reasonFree) || !dob){
    err.textContent=t("errReq"); err.style.display="block"; window.scrollTo({top:0,behavior:"smooth"}); return;
  }
  const payload={
    lang:LANG, createdAt:new Date().toISOString(),
    symptoms:sym, reasonFree,
    address:$("address").value.trim(),
    phone:$("phone").value.trim(),
    dob,
    weight:$("weight-section").style.display!=="none" ? $("weight").value.trim() : "",
    history:checked("his"), historyFree:$("history-free").value.trim(),
    allergy:checked("alg"), allergyFree:$("allergy-free").value.trim()
  };
  const btn=$("btn-submit"); btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>'+t("send");
  try{
    const r=await fetch(WORKER_URL+"/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    if(!r.ok) throw new Error();
    const d=await r.json();
    $("done-code").textContent=d.code;
    show("scr-done");
  }catch(e){
    err.textContent=t("errNet"); err.style.display="block"; window.scrollTo({top:0,behavior:"smooth"});
  }finally{
    btn.disabled=false; btn.innerHTML='<span data-t="send">'+t("send")+'</span>';
  }
});
</script>
